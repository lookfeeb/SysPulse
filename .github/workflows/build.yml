name: Build & Release

on:
  push:
    tags:
      - "v*"          # 推送 v1.0.0 这样的 tag 时触发正式发布
  workflow_dispatch:  # 也可以在 GitHub 网页上手动触发
    inputs:
      lto:
        description: "启用 LTO 编译（更慢但体积更小）"
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # 允许创建 Release

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. 安装 Node.js ──────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. 安装 Rust ─────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # ── 4. 缓存 Cargo 依赖（大幅加速后续编译）────────────────────────────────
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── 5. 安装 .NET 8（编译 hw-helper）─────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # ── 6. 安装前端依赖 ───────────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 7. 编译 hw-helper ────────────────────────────────────────────────────
      - name: Build hw-helper
        run: powershell -ExecutionPolicy Bypass -File scripts/build-helper.ps1

      # ── 8. 读取版本号 ─────────────────────────────────────────────────────────
      - name: Get version
        id: version
        shell: pwsh
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          echo "version=$($conf.version)" >> $env:GITHUB_OUTPUT

      # ── 9. 编译 Tauri（LTO 或普通）───────────────────────────────────────────
      - name: Build Tauri (LTO)
        if: ${{ github.event.inputs.lto == 'true' || startsWith(github.ref, 'refs/tags/') }}
        env:
          CARGO_PROFILE_RELEASE_LTO: fat
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          CARGO_PROFILE_RELEASE_OPT_LEVEL: z
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Build Tauri (Normal)
        if: ${{ github.event.inputs.lto != 'true' && !startsWith(github.ref, 'refs/tags/') }}
        env:
          CARGO_PROFILE_RELEASE_LTO: "false"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      # ── 10. 上传安装包为 Artifact（每次构建都可下载）─────────────────────────
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: SysPulse-v${{ steps.version.outputs.version }}-installers
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: warn

      # ── 11. 推送 tag 时自动创建 GitHub Release ────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "SysPulse v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.nsis.zip
            target/release/bundle/nsis/*.nsis.zip.sig
            target/release/bundle/msi/*.msi.zip
            target/release/bundle/msi/*.msi.zip.sig
          generate_release_notes: true
