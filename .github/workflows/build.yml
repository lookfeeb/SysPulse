name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      lto:
        description: "启用 LTO 编译（更慢但体积更小）"
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - arch: x64
            rust-target: x86_64-pc-windows-msvc
            tauri-target: x86_64-pc-windows-msvc
            helper-runtime: win-x64
          - arch: arm64
            rust-target: aarch64-pc-windows-msvc
            tauri-target: aarch64-pc-windows-msvc
            helper-runtime: win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install npm dependencies
        run: npm ci

      - name: Build hw-helper
        run: powershell -ExecutionPolicy Bypass -File scripts/build-helper.ps1 -Runtime ${{ matrix.helper-runtime }}

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $conf = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          echo "version=$($conf.version)" >> $env:GITHUB_OUTPUT

      - name: Build Tauri (LTO)
        if: ${{ github.event.inputs.lto == 'true' || startsWith(github.ref, 'refs/tags/') }}
        env:
          CARGO_PROFILE_RELEASE_LTO: fat
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "1"
          CARGO_PROFILE_RELEASE_OPT_LEVEL: z
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npx tauri build --target ${{ matrix.tauri-target }} --bundles nsis

      - name: Build Tauri (Normal)
        if: ${{ github.event.inputs.lto != 'true' && !startsWith(github.ref, 'refs/tags/') }}
        env:
          CARGO_PROFILE_RELEASE_LTO: "false"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npx tauri build --target ${{ matrix.tauri-target }} --bundles nsis

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SysPulse-v${{ steps.version.outputs.version }}-${{ matrix.arch }}
          path: |
            target/${{ matrix.rust-target }}/release/bundle/nsis/*.exe
            target/${{ matrix.rust-target }}/release/bundle/nsis/*.nsis.zip
            target/${{ matrix.rust-target }}/release/bundle/nsis/*.nsis.zip.sig
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: SysPulse-*

      - name: List artifacts
        run: find artifacts -type f

      - name: Generate latest.json
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          BASE_URL="https://github.com/lookfeeb/SysPulse/releases/download/${TAG}"

          # Helper: resolve a unique file path from a glob or fail loudly.
          resolve_one() {
            local pattern="$1"
            local -a matches=( $pattern )
            if [ ${#matches[@]} -eq 0 ]; then
              echo "ERROR: no file matched: $pattern" >&2
              exit 1
            fi
            if [ ${#matches[@]} -gt 1 ]; then
              echo "ERROR: multiple files matched: $pattern" >&2
              printf '  %s\n' "${matches[@]}" >&2
              exit 1
            fi
            printf '%s' "${matches[0]}"
          }

          X64_ZIP_PATH=$(resolve_one "artifacts/SysPulse-v${VERSION}-x64/*.nsis.zip")
          X64_SIG_PATH=$(resolve_one "artifacts/SysPulse-v${VERSION}-x64/*.nsis.zip.sig")
          ARM64_ZIP_PATH=$(resolve_one "artifacts/SysPulse-v${VERSION}-arm64/*.nsis.zip")
          ARM64_SIG_PATH=$(resolve_one "artifacts/SysPulse-v${VERSION}-arm64/*.nsis.zip.sig")

          X64_ZIP=$(basename "${X64_ZIP_PATH}")
          ARM64_ZIP=$(basename "${ARM64_ZIP_PATH}")
          X64_SIG=$(cat "${X64_SIG_PATH}")
          ARM64_SIG=$(cat "${ARM64_SIG_PATH}")

          # URL-encode filenames (spaces → %20 etc.) for safety.
          urlencode() {
            jq -rn --arg s "$1" '$s|@uri'
          }
          X64_ZIP_ENC=$(urlencode "${X64_ZIP}")
          ARM64_ZIP_ENC=$(urlencode "${ARM64_ZIP}")

          # Build latest.json via jq to avoid YAML/heredoc quoting issues.
          jq -n \
            --arg version "${VERSION}" \
            --arg notes "SysPulse v${VERSION}" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg x64_sig "${X64_SIG}" \
            --arg x64_url "${BASE_URL}/${X64_ZIP_ENC}" \
            --arg arm64_sig "${ARM64_SIG}" \
            --arg arm64_url "${BASE_URL}/${ARM64_ZIP_ENC}" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": { signature: $x64_sig, url: $x64_url },
                "windows-aarch64": { signature: $arm64_sig, url: $arm64_url }
              }
            }' > latest.json

          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SysPulse v${{ steps.version.outputs.version }}"
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.nsis.zip
            artifacts/**/*.nsis.zip.sig
            latest.json
          generate_release_notes: true
